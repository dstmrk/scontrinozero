version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    # Wait 7 days after a version is published before opening a PR.
    # Avoids immediately adopting packages that may carry newly introduced
    # bugs or supply-chain vulnerabilities on release day.
    # Note: npm ecosystem only supports default-days (no semver-specific params).
    cooldown:
      default-days: 7
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    cooldown:
      default-days: 7
    open-pull-requests-limit: 5
