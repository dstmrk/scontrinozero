name: Claude Code Review

on:
  issue_comment:
    types: [created]

jobs:
  claude-review:
    # Solo su commenti di PR (non issue) che contengono "/claude review"
    if: |
      github.event.issue.pull_request != null &&
      contains(github.event.comment.body, '/claude review')

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Check CI status
        uses: actions/github-script@v8
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            const { data: checks } = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: pr.data.head.sha,
              per_page: 100
            });
            const failed = checks.check_runs.filter(c =>
              c.name !== 'claude-review' &&
              c.conclusion !== null &&
              c.conclusion !== 'success' &&
              c.conclusion !== 'skipped' &&
              c.conclusion !== 'neutral'
            );
            if (failed.length > 0) {
              core.setFailed(`CI non verde. Job falliti: ${failed.map(c => c.name).join(', ')}`);
            }

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1.0.94
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: '/code-review:code-review ${{ github.repository }}/pull/${{ github.event.issue.number }}'
