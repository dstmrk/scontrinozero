name: Deploy

on:
  push:
    tags:
      - "v*.*.*"

# Only one build at a time
concurrency:
  group: deploy
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  check-ci:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      checks: read
    steps:
      - name: Verify all CI checks are green on the tagged commit
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const sha = context.sha;
            const { data } = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: sha,
              per_page: 100,
            });

            const ciChecks = data.check_runs.filter(
              r => r.app?.slug === 'github-actions' && r.name !== 'check-ci'
            );

            if (ciChecks.length === 0) {
              core.setFailed(
                `No CI checks found for ${sha.substring(0, 7)}. ` +
                'Push to main and wait for CI to pass before tagging.'
              );
              return;
            }

            const notPassed = ciChecks.filter(
              r => r.conclusion !== 'success' && r.conclusion !== 'skipped'
            );

            if (notPassed.length > 0) {
              const names = notPassed
                .map(r => `${r.name} (${r.status}/${r.conclusion ?? 'pending'})`)
                .join(', ');
              core.setFailed(`CI not green on ${sha.substring(0, 7)}: ${names}`);
            } else {
              core.info(`All ${ciChecks.length} CI checks passed on ${sha.substring(0, 7)}`);
            }

  # Build → smoke test → Trivy → push in un unico job: l'immagine buildata
  # resta nel daemon Docker locale, senza il round-trip docker save →
  # upload-artifact → download → load (×2) e senza due runner spin-up
  # intermedi della precedente catena build-image → smoke-test → push-image.
  # I gate restano gli stessi, in sequenza: il push su GHCR avviene solo se
  # l'health probe del container e lo scan Trivy passano.
  build-smoke-push:
    needs: [check-ci]
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      contents: read
      packages: write
    env:
      # Opt into Node.js 24 runtime now; trivy-action@v0.35.0 pins
      # actions/cache@v4.2.4 (node20) internally — force node24 until
      # trivy-action ships a release that depends on actions/cache@v5.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Build image (no push)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          platforms: linux/amd64
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_SENTRY_DSN=${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
            NEXT_PUBLIC_TURNSTILE_SITE_KEY=${{ secrets.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}
            SENTRY_ORG=${{ secrets.SENTRY_ORG }}
            SENTRY_PROJECT=${{ secrets.SENTRY_PROJECT }}
            BUILD_SHA=${{ github.sha }}
          secrets: |
            sentry_auth_token=${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Smoke test — start container
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.TEST_NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.TEST_NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_SECRET_KEY: ${{ secrets.TEST_SUPABASE_SECRET_KEY }}
          DATABASE_URL: "postgresql://smoke:smoke@localhost:5432/smoke"
          ENCRYPTION_KEY: ${{ secrets.TEST_ENCRYPTION_KEY }}
          ENCRYPTION_KEY_VERSION: "1"
          SKIP_MIGRATIONS: "true"
          ADE_MODE: "mock"
          NEXT_PUBLIC_APP_URL: "http://localhost:3000"
          TURNSTILE_SECRET_KEY: "1x0000000000000000000000000000000AA"
        run: |
          docker run -d \
            --name scontrinozero-smoke \
            -p 3000:3000 \
            -e NEXT_PUBLIC_SUPABASE_URL \
            -e NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY \
            -e SUPABASE_SECRET_KEY \
            -e DATABASE_URL \
            -e ENCRYPTION_KEY \
            -e ENCRYPTION_KEY_VERSION \
            -e SKIP_MIGRATIONS \
            -e ADE_MODE \
            -e NEXT_PUBLIC_APP_URL \
            -e TURNSTILE_SECRET_KEY \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"

      - name: Smoke test — wait for container health
        run: |
          for i in $(seq 1 60); do
            status="$(docker inspect --format='{{.State.Status}}' scontrinozero-smoke 2>/dev/null || true)"
            if [ "$status" = "exited" ] || [ "$status" = "dead" ]; then
              docker logs scontrinozero-smoke || true
              exit 1
            fi
            if curl -fsS http://127.0.0.1:3000/api/health/live >/dev/null; then
              echo "Container healthy after ${i} attempts"
              exit 0
            fi
            sleep 2
          done
          docker logs scontrinozero-smoke || true
          exit 1

      - name: Show container logs on failure
        if: failure()
        run: docker logs scontrinozero-smoke || true

      - name: Stop smoke container
        if: always()
        run: docker rm -f scontrinozero-smoke || true

      - name: Set image ref
        id: image-ref
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "value=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Log in to Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Trivy — Docker image scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ steps.image-ref.outputs.value }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

      - name: Push image
        run: |
          set -euo pipefail
          image="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          version="${GITHUB_REF_NAME#v}"
          # Push each tag with exponential backoff (2s,4s,8s,16s) to ride out
          # transient GHCR "unknown blob" / EOF errors on manifest finalize.
          push_with_retry() {
            local ref="$1" attempt=1 delay=2
            while true; do
              if docker push "$ref"; then
                return 0
              fi
              if [ "$attempt" -ge 5 ]; then
                echo "::error::docker push failed for $ref after $attempt attempts"
                return 1
              fi
              echo "push attempt $attempt for $ref failed; retrying in ${delay}s"
              sleep "$delay"
              attempt=$((attempt + 1))
              delay=$((delay * 2))
            done
          }
          for tag in "$version" latest; do
            push_with_retry "${image}:${tag}"
          done
