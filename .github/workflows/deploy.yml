name: Deploy

on:
  push:
    tags:
      - "v*.*.*"

# Only one build at a time
concurrency:
  group: deploy
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  IMAGE_ARTIFACT_NAME: docker-image
  IMAGE_ARCHIVE_PATH: /tmp/scontrinozero-image.tar

jobs:
  build-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      image-ref: ${{ steps.image-ref.outputs.image-ref }}
    steps:
      - uses: actions/checkout@v6

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Select image ref for downstream jobs
        id: image-ref
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "image-ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image (no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_SENTRY_DSN=${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
            NEXT_PUBLIC_TURNSTILE_SITE_KEY=${{ secrets.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}
            SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}
            SENTRY_ORG=${{ secrets.SENTRY_ORG }}
            SENTRY_PROJECT=${{ secrets.SENTRY_PROJECT }}

      - name: Export built image archive
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          docker save \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION}" \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" \
            --output "${IMAGE_ARCHIVE_PATH}"

      - name: Upload built image archive
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.IMAGE_ARTIFACT_NAME }}
          path: ${{ env.IMAGE_ARCHIVE_PATH }}
          retention-days: 1

  smoke-test:
    needs: [build-image]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.TEST_NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.TEST_NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
      SUPABASE_SECRET_KEY: ${{ secrets.TEST_SUPABASE_SECRET_KEY }}
      DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
      ENCRYPTION_KEY: ${{ secrets.TEST_ENCRYPTION_KEY }}
      ENCRYPTION_KEY_VERSION: "1"
      ADE_MODE: "mock"
      NEXT_PUBLIC_APP_URL: "http://localhost:3000"
      TURNSTILE_SECRET_KEY: "1x0000000000000000000000000000000AA"
    steps:
      - name: Download built image archive
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.IMAGE_ARTIFACT_NAME }}
          path: /tmp

      - name: Load built image
        run: docker load --input "${IMAGE_ARCHIVE_PATH}"

      - name: Start container
        run: |
          docker run -d \
            --name scontrinozero-smoke \
            -p 3000:3000 \
            -e NEXT_PUBLIC_SUPABASE_URL \
            -e NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY \
            -e SUPABASE_SECRET_KEY \
            -e DATABASE_URL \
            -e ENCRYPTION_KEY \
            -e ENCRYPTION_KEY_VERSION \
            -e ADE_MODE \
            -e NEXT_PUBLIC_APP_URL \
            -e TURNSTILE_SECRET_KEY \
            "${{ needs.build-image.outputs.image-ref }}"

      - name: Wait for container health
        run: |
          for i in $(seq 1 60); do
            status="$(docker inspect --format='{{.State.Status}}' scontrinozero-smoke 2>/dev/null || true)"
            if [ "$status" = "exited" ] || [ "$status" = "dead" ]; then
              docker logs scontrinozero-smoke || true
              exit 1
            fi
            if curl -fsS http://127.0.0.1:3000/api/health >/dev/null; then
              echo "Container healthy after ${i} attempts"
              exit 0
            fi
            sleep 2
          done
          docker logs scontrinozero-smoke || true
          exit 1

      - name: Show container logs on failure
        if: failure()
        run: docker logs scontrinozero-smoke || true

      - name: Stop container
        if: always()
        run: docker rm -f scontrinozero-smoke || true

  push-image:
    needs: [build-image, smoke-test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download built image archive
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.IMAGE_ARTIFACT_NAME }}
          path: /tmp

      - name: Load built image archive
        run: docker load --input "${IMAGE_ARCHIVE_PATH}"

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Trivy — Docker image scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ needs.build-image.outputs.image-ref }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

      - name: Push image
        run: docker push --all-tags ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
