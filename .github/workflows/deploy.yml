name: Deploy

on:
  push:
    tags:
      - "v*.*.*"

# Only one build at a time
concurrency:
  group: deploy
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-test-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.TEST_NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.TEST_NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
      SUPABASE_SECRET_KEY: ${{ secrets.TEST_SUPABASE_SECRET_KEY }}
      DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
      ENCRYPTION_KEY: ${{ secrets.TEST_ENCRYPTION_KEY }}
      ENCRYPTION_KEY_VERSION: "1"
      ADE_MODE: "mock"
      NEXT_PUBLIC_APP_URL: "http://localhost:3000"
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: "1x00000000000000000000AA"
      TURNSTILE_SECRET_KEY: "1x0000000000000000000000000000000AA"
      PLAYWRIGHT_USE_EXISTING_SERVER: "1"
      PLAYWRIGHT_BASE_URL: "http://localhost:3000"
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image (no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_SENTRY_DSN=${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
            NEXT_PUBLIC_TURNSTILE_SITE_KEY=${{ secrets.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}
            SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}
            SENTRY_ORG=${{ secrets.SENTRY_ORG }}
            SENTRY_PROJECT=${{ secrets.SENTRY_PROJECT }}

      - name: Start built image
        run: |
          docker run -d --rm \
            --name scontrinozero-e2e \
            -p 3000:3000 \
            -e NEXT_PUBLIC_SUPABASE_URL \
            -e NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY \
            -e SUPABASE_SECRET_KEY \
            -e DATABASE_URL \
            -e ENCRYPTION_KEY \
            -e ENCRYPTION_KEY_VERSION \
            -e ADE_MODE \
            -e NEXT_PUBLIC_APP_URL \
            -e TURNSTILE_SECRET_KEY \
            "${{ fromJSON(steps.meta.outputs.json).tags[0] }}"

      - name: Wait for container health
        run: |
          for i in $(seq 1 60); do
            health="$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' scontrinozero-e2e)"
            if [ "$health" = "healthy" ]; then
              exit 0
            fi
            if curl -fsS http://127.0.0.1:3000/api/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker logs scontrinozero-e2e
          exit 1

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload report
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Show container logs on failure
        if: failure()
        run: docker logs scontrinozero-e2e

      - name: Stop container
        if: always()
        run: docker rm -f scontrinozero-e2e || true

      - name: Trivy — Docker image scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

      - name: Push image
        # The image was already built and loaded into the local Docker daemon above.
        # --all-tags pushes both the semver tag and latest without rebuilding layers.
        run: docker push --all-tags ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
