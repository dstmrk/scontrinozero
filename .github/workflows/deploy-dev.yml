name: Deploy (dev)

# Ambiente dev su Raspberry Pi 5 (arm64). A differenza di prod/sandbox
# (deploy tag-based vX.Y.Z, immagine linux/amd64), dev traccia `main`:
# a ogni push (commit diretto o merge di PR) ricompila l'immagine arm64,
# la pubblica su GHCR come :dev e notifica il Pi via webhook.
on:
  push:
    branches:
      - main

# L'ultimo push su main vince: annulla eventuali build dev in corso.
concurrency:
  group: deploy-dev
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-deploy:
    # Runner ARM nativo (gratis sui repo pubblici): build arm64 senza QEMU.
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Log in to Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (arm64, :dev)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev
          # Cache GHA isolata da quella di prod (amd64) per evitare collisioni.
          cache-from: type=gha,scope=dev-arm64
          cache-to: type=gha,mode=max,scope=dev-arm64
          build-args: |
            NEXT_PUBLIC_TURNSTILE_SITE_KEY=${{ secrets.NEXT_PUBLIC_TURNSTILE_SITE_KEY_DEV || secrets.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}
            NEXT_PUBLIC_APP_URL=https://app-dev.scontrinozero.it
            NEXT_PUBLIC_APP_HOSTNAME=app-dev.scontrinozero.it
            NEXT_PUBLIC_MARKETING_HOSTNAME=dev.scontrinozero.it
            NEXT_PUBLIC_API_HOSTNAME=api-dev.scontrinozero.it
          # NEXT_PUBLIC_TURNSTILE_SITE_KEY: letta in un client component
          # (turnstile-widget.tsx) → inlinata nel bundle. Dev usa il SUO widget
          # Turnstile dedicato (secret `NEXT_PUBLIC_TURNSTILE_SITE_KEY_DEV`), così
          # site key bakata e `TURNSTILE_SECRET_KEY` runtime sul Pi appartengono
          # allo stesso widget — altrimenti siteverify rifiuta il token
          # (`invalid-input-secret`/`invalid-input-response`). Fallback alla key
          # di prod se il secret dev non è ancora configurato (no key vuota nel
          # bundle). ⚠️ La `TURNSTILE_SECRET_KEY` nel `.env` del Pi DEVE essere
          # la secret di QUESTO stesso widget dev.
          # NEXT_PUBLIC_APP_URL/APP_HOSTNAME/MARKETING/API: valutati al build
          # (marketing SSG, next.config redirects/headers, metadataBase) e nel
          # bundle client (appHref in header.tsx). Bakati coi valori dev così i
          # link Accedi/Registrati, il redirect /→/dashboard e il CORS puntano a
          # app-dev (non al default prod). Non sono segreti → letterali qui.
          # Supabase/Stripe/ecc. restano runtime (solo nel .env del Pi).
          # Sentry OFF su dev: niente NEXT_PUBLIC_SENTRY_DSN (no DSN nel bundle)
          # né SENTRY_AUTH_TOKEN/ORG/PROJECT (no upload source-map).

      - name: Trigger Raspberry Pi deploy
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
          DEPLOY_HMAC_SECRET: ${{ secrets.DEPLOY_HMAC_SECRET }}
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          set -euo pipefail
          BODY="$(printf '{"sha":"%s","ref":"%s"}' "${GITHUB_SHA}" "${GITHUB_REF_NAME}")"
          # Firma HMAC-SHA256 del body — verificata da adnanh/webhook sul Pi.
          SIG="$(printf '%s' "${BODY}" \
            | openssl dgst -sha256 -hmac "${DEPLOY_HMAC_SECRET}" \
            | sed 's/^.*=[[:space:]]*//')"
          # CF Access service token: bloccato all'edge prima di arrivare al Pi.
          curl --fail --silent --show-error --retry 3 --retry-delay 5 \
            -X POST "${DEPLOY_WEBHOOK_URL}" \
            -H "Content-Type: application/json" \
            -H "CF-Access-Client-Id: ${CF_ACCESS_CLIENT_ID}" \
            -H "CF-Access-Client-Secret: ${CF_ACCESS_CLIENT_SECRET}" \
            -H "X-Hub-Signature-256: sha256=${SIG}" \
            -d "${BODY}"
