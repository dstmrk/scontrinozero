name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Smart skip: only run if relevant files changed
  changes:
    runs-on: ubuntu-latest
    outputs:
      src: ${{ steps.filter.outputs.src }}
      lockfile: ${{ steps.filter.outputs.lockfile }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            src:
              - 'src/**'
              - 'tests/**'
              - 'package.json'
              - 'tsconfig.json'
              - 'next.config.ts'
              - 'vitest.config.ts'
              - 'eslint.config.mjs'
            lockfile:
              - 'package-lock.json'

  # Scansione segreti — gira su tutti i push/PR (indipendente dal diff)
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Gitleaks — secret scanning
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Audit dipendenze — gira anche su modifiche al solo lockfile
  audit:
    needs: changes
    if: needs.changes.outputs.src == 'true' || needs.changes.outputs.lockfile == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Security audit
        run: npx audit-ci --config audit-ci.json

  # Parallel checks — lint, type-check e test girano in contemporanea
  lint:
    needs: changes
    if: needs.changes.outputs.src == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint

  type-check:
    needs: changes
    if: needs.changes.outputs.src == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npm run type-check

  test:
    needs: changes
    if: needs.changes.outputs.src == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Test with coverage
        run: npm run test:coverage
      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/
          retention-days: 1
      - name: Upload test execution report
        uses: actions/upload-artifact@v7
        with:
          name: test-execution-report
          path: test-report.xml
          retention-days: 1

  # SonarQube parte non appena i test finiscono, in parallelo con build
  sonar:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Download coverage report
        uses: actions/download-artifact@v8
        with:
          name: coverage-report
          path: coverage/
      - name: Download test execution report
        uses: actions/download-artifact@v8
        with:
          name: test-execution-report
      - name: SonarQube Cloud scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # Build parte solo quando tutti e tre i check paralleli sono verdi
  build:
    needs: [lint, type-check, test]
    if: needs.changes.outputs.src == 'true'
    runs-on: ubuntu-latest
    # NEXT_PUBLIC_* vars are baked into the client bundle at build time.
    # Use test values so the build succeeds in CI without production secrets.
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.TEST_NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.TEST_NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: "1x00000000000000000000AA"
      NEXT_PUBLIC_APP_URL: "http://localhost:3000"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Upload build output
        uses: actions/upload-artifact@v7
        with:
          name: next-build
          path: |
            .next/
            !.next/cache
          retention-days: 1

