name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Smart skip: only run if relevant files changed
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      code: ${{ steps.agg.outputs.code }}
      marketing: ${{ steps.f.outputs.marketing }}
      lockfile: ${{ steps.f.outputs.lockfile }}
      migrations: ${{ steps.f.outputs.migrations }}
      arch_docs: ${{ steps.f.outputs.arch_docs }}
      hooks: ${{ steps.f.outputs.hooks }}
      workflows: ${{ steps.f.outputs.workflows }}
      ci_scripts: ${{ steps.f.outputs.ci_scripts }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # Filtri "semplici" — predicate-quantifier di default (`some`).
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: f
        with:
          filters: |
            marketing:
              - 'src/app/(marketing)/**'
              - 'src/components/marketing/**'
            tests:
              - 'tests/**'
            config:
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.json'
              - 'next.config.ts'
              - 'vitest.config.ts'
              - 'eslint.config.mjs'
              - 'scripts/**'
              - '.github/workflows/ci.yml'
            lockfile:
              - 'package-lock.json'
            migrations:
              - 'supabase/migrations/**'
              - 'scripts/check-migrations.mjs'
            arch_docs:
              - 'docs/architecture/**'
              - 'scripts/check-architecture-docs.mjs'
              - 'src/**'
            hooks:
              - '.claude/hooks/**'
            workflows:
              - '.github/workflows/**'
            ci_scripts:
              - 'scripts/ci/**'
              - '.github/workflows/ci.yml'
      # Filtro "src/** escluso marketing": serve `predicate-quantifier: every`
      # per far valere le negazioni. Con `some` (default), un file marketing
      # matcherebbe comunque `src/**` e setterebbe il flag a true.
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: f_src
        with:
          predicate-quantifier: every
          filters: |
            non_marketing:
              - 'src/**'
              - '!src/app/(marketing)/**'
              - '!src/components/marketing/**'
      # Aggrega un singolo flag `code` = "richiede lint+type-check+test+build".
      # true se: tests/, file di config, oppure src/ non-marketing cambiano.
      - name: Aggregate code flag
        id: agg
        run: |
          if [ "${{ steps.f.outputs.tests }}" = "true" ] \
             || [ "${{ steps.f.outputs.config }}" = "true" ] \
             || [ "${{ steps.f_src.outputs.non_marketing }}" = "true" ]; then
            echo "code=true" >> "$GITHUB_OUTPUT"
          else
            echo "code=false" >> "$GITHUB_OUTPUT"
          fi

  # Verifica che tutti i file .sql siano registrati in _journal.json.
  # Gira solo quando cambia supabase/migrations/** o lo script di check.
  migrations-check:
    needs: changes
    if: needs.changes.outputs.migrations == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Check migration journal consistency
        run: node scripts/check-migrations.mjs

  # Verifica che ogni path citato in docs/architecture/ esista ancora su disco
  # (anti-drift della mappa codebase, CLAUDE.md regola 26). Gira quando cambiano
  # i doc, lo script, o src/** (un rename in src/ può orfanare un riferimento).
  arch-docs-check:
    needs: changes
    if: needs.changes.outputs.arch_docs == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Check architecture docs references
        run: node scripts/check-architecture-docs.mjs

  # Esegue le suite di test degli hook PreToolUse (.claude/hooks/).
  # Gira solo quando cambia .claude/hooks/**. Difesa-in-profondità per le
  # regole 1 e 11 di CLAUDE.md: un regex che smette di bloccare push su main
  # o `drizzle-kit generate` deve fallire la CI, non passare silenzioso.
  hook-tests:
    needs: changes
    if: needs.changes.outputs.hooks == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Run hook test suites
        run: |
          bash .claude/hooks/test-block-push-to-main.sh
          bash .claude/hooks/test-block-drizzle-generate.sh

  # Testa il wrapper dello scan Sonar (retry + tolleranza 403 del CDN).
  # Gira solo quando cambia scripts/ci/** o ci.yml. Rete-di-sicurezza: una
  # regressione che ingoiasse i fallimenti *reali* dello scan (perdita silente
  # del quality gate) o che tornasse a fallire sul 403 deve far rosso la CI.
  sonar-script-tests:
    needs: changes
    if: needs.changes.outputs.ci_scripts == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Run sonar-scan wrapper tests
        run: bash scripts/ci/test-sonar-scan.sh

  # Scansione segreti — gira su tutti i push/PR (indipendente dal diff)
  secret-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Gitleaks — secret scanning
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # gitleaks-action v2 is still pinned to Node 20. Opt into Node 24 to
          # silence the deprecation warning until upstream ships a Node 24 build.
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

  # Lint dei file workflow — gira solo se .github/workflows/** cambia.
  # Cattura errori sintattici/logici (anche in deploy.yml & co) prima del prossimo tag.
  actionlint:
    needs: changes
    if: needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Download actionlint
        id: get_actionlint
        run: bash <(curl -sSf https://raw.githubusercontent.com/rhysd/actionlint/v1.7.7/scripts/download-actionlint.bash) 1.7.7
      - name: Run actionlint
        run: ${{ steps.get_actionlint.outputs.executable }} -color

  # Audit dipendenze — gira anche su modifiche al solo lockfile
  audit:
    needs: changes
    if: needs.changes.outputs.code == 'true' || needs.changes.outputs.lockfile == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
      - name: Cache node_modules
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v4.2.4
        id: nm-cache
        with:
          path: node_modules
          key: nm-${{ runner.os }}-node22-${{ hashFiles('package-lock.json') }}
      - name: Install dependencies
        if: steps.nm-cache.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline --no-audit --no-fund
      - name: Security audit
        run: npx audit-ci --config audit-ci.json

  # Parallel checks — lint, type-check e test girano in contemporanea.
  # lint e type-check girano anche su marketing-only (catturano refusi JSX/TS).
  lint:
    needs: changes
    if: needs.changes.outputs.code == 'true' || needs.changes.outputs.marketing == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
      - name: Cache node_modules
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v4.2.4
        id: nm-cache
        with:
          path: node_modules
          key: nm-${{ runner.os }}-node22-${{ hashFiles('package-lock.json') }}
      - name: Install dependencies
        if: steps.nm-cache.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline --no-audit --no-fund
      - name: Lint
        run: npm run lint

  type-check:
    needs: changes
    if: needs.changes.outputs.code == 'true' || needs.changes.outputs.marketing == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
      - name: Cache node_modules
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v4.2.4
        id: nm-cache
        with:
          path: node_modules
          key: nm-${{ runner.os }}-node22-${{ hashFiles('package-lock.json') }}
      - name: Install dependencies
        if: steps.nm-cache.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline --no-audit --no-fund
      - name: Type check
        run: npm run type-check

  # test gira solo su modifiche a codice testabile.
  # Marketing-only viene escluso: i path sono gia' fuori da coverage (vitest.config.ts)
  # e nessun test esercita queste UI.
  test:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
      - name: Cache node_modules
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v4.2.4
        id: nm-cache
        with:
          path: node_modules
          key: nm-${{ runner.os }}-node22-${{ hashFiles('package-lock.json') }}
      - name: Install dependencies
        if: steps.nm-cache.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline --no-audit --no-fund
      - name: Test with coverage
        run: npm run test:coverage
      - name: Upload coverage report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-report
          path: coverage/
          retention-days: 1
      - name: Upload test execution report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: test-execution-report
          path: test-report.xml
          retention-days: 1

  # SonarQube parte non appena i test finiscono, in parallelo con build.
  # Saltato per le PR di Dependabot (SONAR_TOKEN non disponibile per bot esterni)
  # e quando test e' stato skippato (no artifact da scaricare).
  sonar:
    needs: [changes, test]
    if: needs.changes.outputs.code == 'true' && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Single source of truth per la cache key; sonar-scan.sh la legge e
      # scarica questa stessa versione su cache miss.
      SCANNER_VERSION: "8.0.1.6346"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Download coverage report
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: coverage-report
          path: coverage/
      - name: Download test execution report
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: test-execution-report
      # Cache della scanner CLI (~50MB dal CDN flaky di Sonar) e della plugin
      # cache dello scanner: su hit lo script salta il download — meno tempo
      # sul percorso critico e zero esposizione ai 403 intermittenti del CDN.
      - name: Cache SonarScanner CLI + plugin cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v4.2.4
        with:
          path: |
            ~/.sonar-scanner
            ~/.sonar/cache
          key: sonar-scanner-${{ runner.os }}-${{ env.SCANNER_VERSION }}
      # Wrapper around the scanner CLI instead of SonarSource/sonarqube-scan-action:
      # that action has no retry and re-downloads the CLI from binaries.sonarsource.com
      # every run, so an intermittent HTTP 403 from Sonar's CDN sinks the job (and
      # spams notifications on main). The wrapper retries the download and, if the
      # CDN stays unreachable, skips with a warning instead of failing — real scan
      # errors still turn the job red. Logic covered by scripts/ci/test-sonar-scan.sh.
      - name: SonarQube Cloud scan (cached CLI, retry + tolerate CDN 403)
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          # Dir fissa (ripristinata dalla cache) al posto del mktemp di default.
          WORK_DIR: /home/runner/.sonar-scanner
        run: bash scripts/ci/sonar-scan.sh

  # Build parte quando lint, type-check e test sono verdi (test puo' essere skippato
  # su marketing-only: GitHub Actions tratta "skipped" come "success" in needs:).
  build:
    needs: [changes, lint, type-check, test]
    if: needs.changes.outputs.code == 'true' || needs.changes.outputs.marketing == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # NEXT_PUBLIC_* vars are baked into the client bundle at build time.
    # Use test values so the build succeeds in CI without production secrets.
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.TEST_NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.TEST_NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: "1x00000000000000000000AA"
      NEXT_PUBLIC_APP_URL: "http://localhost:3000"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
      - name: Cache node_modules
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v4.2.4
        id: nm-cache
        with:
          path: node_modules
          key: nm-${{ runner.os }}-node22-${{ hashFiles('package-lock.json') }}
      - name: Install dependencies
        if: steps.nm-cache.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline --no-audit --no-fund
      # Cache incrementale di Next.js (pattern ufficiale): key esatta su
      # lockfile+sorgenti, restore-key di fallback sul solo lockfile così
      # ogni build riparte dalla cache più recente compatibile.
      - name: Cache Next.js build cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v4.2.4
        with:
          path: .next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ hashFiles('src/**/*.ts', 'src/**/*.tsx', 'next.config.ts') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-
      - name: Build
        run: npm run build
