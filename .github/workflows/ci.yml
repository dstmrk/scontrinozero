name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Smart skip: only run if relevant files changed
  changes:
    runs-on: ubuntu-latest
    outputs:
      src: ${{ steps.filter.outputs.src }}
      e2e: ${{ steps.filter.outputs.e2e }}
      lockfile: ${{ steps.filter.outputs.lockfile }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            src:
              - 'src/**'
              - 'tests/**'
              - 'package.json'
              - 'tsconfig.json'
              - 'next.config.ts'
              - 'vitest.config.ts'
              - 'eslint.config.mjs'
            e2e:
              - 'src/**'
              - 'e2e/**'
              - 'package.json'
              - 'next.config.ts'
              - 'playwright.config.ts'
            lockfile:
              - 'package-lock.json'

  # Scansione segreti — gira su tutti i push/PR (indipendente dal diff)
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Gitleaks — secret scanning
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Audit dipendenze — gira anche su modifiche al solo lockfile
  audit:
    needs: changes
    if: needs.changes.outputs.src == 'true' || needs.changes.outputs.lockfile == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Security audit
        run: npx audit-ci --config audit-ci.json

  # Parallel checks — lint, type-check e test girano in contemporanea
  lint:
    needs: changes
    if: needs.changes.outputs.src == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint

  type-check:
    needs: changes
    if: needs.changes.outputs.src == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npm run type-check

  test:
    needs: changes
    if: needs.changes.outputs.src == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Test with coverage
        run: npm run test:coverage
      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/
          retention-days: 1
      - name: Upload test execution report
        uses: actions/upload-artifact@v7
        with:
          name: test-execution-report
          path: test-report.xml
          retention-days: 1

  # SonarQube parte non appena i test finiscono, in parallelo con build
  sonar:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Download coverage report
        uses: actions/download-artifact@v8
        with:
          name: coverage-report
          path: coverage/
      - name: Download test execution report
        uses: actions/download-artifact@v8
        with:
          name: test-execution-report
      - name: SonarQube Cloud scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # Build parte solo quando tutti e tre i check paralleli sono verdi
  build:
    needs: [lint, type-check, test]
    if: needs.changes.outputs.src == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Upload build output
        uses: actions/upload-artifact@v7
        with:
          name: next-build
          path: |
            .next/
            !.next/cache
          retention-days: 1

  e2e:
    needs: [build, changes]
    if: needs.changes.outputs.e2e == 'true' && (needs.build.result == 'success' || needs.build.result == 'skipped')
    runs-on: ubuntu-latest
    # Env vars needed to run the Next.js app and global-setup/teardown.
    # Secrets must be configured in GitHub → Settings → Secrets and variables → Actions.
    # Use the TEST_* prefix to distinguish from production secrets.
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.TEST_NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.TEST_NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
      SUPABASE_SECRET_KEY: ${{ secrets.TEST_SUPABASE_SECRET_KEY }}
      DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
      ENCRYPTION_KEY: ${{ secrets.TEST_ENCRYPTION_KEY }}
      ENCRYPTION_KEY_VERSION: "1"
      ADE_MODE: "mock"
      NEXT_PUBLIC_APP_URL: "http://localhost:3000"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Download build output
        # Try to reuse the artifact from the build job when it ran.
        # continue-on-error so a missing artifact falls back to inline build.
        id: download-build
        if: needs.build.result == 'success'
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: next-build
          path: .next/
      - name: Build
        # Build inline when: build job was skipped (only e2e files changed)
        # OR artifact download failed for any reason.
        if: steps.download-build.outcome != 'success'
        run: npm run build
      - name: Cache Playwright browsers
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps
      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
      - name: Run E2E tests
        run: npm run test:e2e
      - name: Upload report
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
