services:
  app:
    image: ghcr.io/dstmrk/scontrinozero:latest
    container_name: scontrinozero
    restart: always
    env_file: .env
    ports:
      - "3000:3000"
    mem_limit: 512m
    cpus: "0.8"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: scontrinozero-tunnel
    restart: always
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - app
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
