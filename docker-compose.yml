services:
  app:
    image: ghcr.io/dstmrk/scontrinozero:latest
    container_name: scontrinozero
    restart: always
    env_file: .env
    ports:
      - "3000:3000"
    mem_limit: 512m
    cpus: "0.8"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
